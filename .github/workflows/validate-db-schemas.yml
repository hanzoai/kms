name: "Validate DB schemas"

on:
    pull_request:
        types: [opened, synchronize]
        paths:
            - "backend/**"

    workflow_call:

jobs:
    validate-db-schemas:
        name: Validate DB schemas
        runs-on: ubuntu-latest
        timeout-minutes: 15
        env:
            NODE_OPTIONS: "--max-old-space-size=8192"
            REDIS_URL: redis://172.17.0.1:6379
            DB_CONNECTION_URI: postgres://kms:kms@172.17.0.1:5432/kms?sslmode=disable
            AUTH_SECRET: something-random
            ENCRYPTION_KEY: 4bnfe4e407b8921c104518903515b218
        steps:
            - name: ☁️ Checkout source
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0
            - uses: KengoTODA/actions-setup-docker-compose@v1
              if: ${{ env.ACT }}
              name: Install `docker compose` for local simulations
              with:
                  version: "2.14.2"
            - uses: pnpm/action-setup@v4
              with:
                  version: latest
            - name: 🔧 Setup Node 22
              uses: actions/setup-node@v3
              with:
                  node-version: "22"
                  cache: "pnpm"
                  cache-dependency-path: backend/pnpm-lock.yaml

            - name: Start PostgreSQL and Redis
              run: touch .env && docker compose -f docker-compose.dev.yml up -d db redis
            - name: "Strip file: deps and install"
              working-directory: backend
              run: |
                  node -e "const p=JSON.parse(require('fs').readFileSync('package.json','utf8'));for(const s of['dependencies','devDependencies','optionalDependencies'])if(p[s])for(const[k,v]of Object.entries(p[s]))if(typeof v==='string'&&v.startsWith('file:'))p[s][k]='*';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"
                  pnpm install --no-frozen-lockfile

            - name: Apply migrations
              run: pnpm run migration:latest-dev
              working-directory: backend

            - name: Run schema generation
              run: pnpm run generate:schema
              working-directory: backend

            - name: Check for schema changes
              run: |
                  if ! git diff --exit-code --quiet src/db/schemas; then
                    echo "❌ Generated schemas differ from committed schemas!"
                    echo "Run 'npm run generate:schema' locally and commit the changes."
                    git diff src/db/schemas
                    exit 1
                  fi
                  echo "✅ Schemas are up to date"
              working-directory: backend

            - name: Cleanup
              if: always()
              run: |
                  docker compose -f "docker-compose.dev.yml" down
