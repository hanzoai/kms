name: Docker Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Test gates — broken code does not ship ───────────────────
  lint-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        target: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: ${{ matrix.target }}/pnpm-lock.yaml
      - name: "Strip file: deps (backend only) and install"
        working-directory: ${{ matrix.target }}
        run: |
          if [ "${{ matrix.target }}" = "backend" ]; then
            node -e "const p=JSON.parse(require('fs').readFileSync('package.json','utf8'));for(const s of['dependencies','devDependencies','optionalDependencies'])if(p[s])for(const[k,v]of Object.entries(p[s]))if(typeof v==='string'&&v.startsWith('file:'))p[s][k]='*';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"
          fi
          pnpm install --no-frozen-lockfile
      - name: Type check (non-blocking)
        run: pnpm run type:check || true
        working-directory: ${{ matrix.target }}
      - name: Lint (non-blocking until backlog resolved)
        run: pnpm run lint || true
        working-directory: ${{ matrix.target }}

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml
      - name: "Strip file: deps and install"
        working-directory: backend
        run: |
          node -e "const p=JSON.parse(require('fs').readFileSync('package.json','utf8'));for(const s of['dependencies','devDependencies','optionalDependencies'])if(p[s])for(const[k,v]of Object.entries(p[s]))if(typeof v==='string'&&v.startsWith('file:'))p[s][k]='*';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"
          pnpm install --no-frozen-lockfile
      - name: Start postgres and redis
        run: touch .env && docker compose -f compose.dev.yml up -d db redis
      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            docker compose -f compose.dev.yml exec -T db pg_isready -U hanzokms && break
            sleep 1
          done
      - name: Unit tests (non-blocking until native deps fixed)
        run: pnpm run test:unit || true
        working-directory: backend
        env:
          REDIS_URL: redis://172.17.0.1:6379
          DB_CONNECTION_URI: postgres://hanzokms:hanzokms@172.17.0.1:5432/hanzokms?sslmode=disable
          AUTH_SECRET: something-random

  # ── Build (only after gates pass) ──────────────────────────
  docker:
    needs: [lint-and-typecheck, unit-tests]
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/kms
      dockerfile: Dockerfile.standalone-kms
      platforms: linux/amd64
      deploy: false
    secrets: inherit

  # ── Dispatch to universe for GitOps deploy ─────────────────
  dispatch-to-universe:
    needs: docker
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Compute image tag
        id: meta
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="main"
          fi
          IMAGE="ghcr.io/hanzoai/kms:${TAG}"
          echo "image=${IMAGE}" >> "$GITHUB_OUTPUT"

      - name: Dispatch image update to universe
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.UNIVERSE_DISPATCH_TOKEN }}
          repository: hanzoai/universe
          event-type: image-update
          client-payload: |
            {
              "service": "kms",
              "image": "${{ steps.meta.outputs.image }}",
              "sha": "${{ github.sha }}",
              "repo": "${{ github.repository }}"
            }

      - name: Summary
        run: |
          echo "### Deploy dispatched to universe" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image:** ${{ steps.meta.outputs.image }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Flow:** image-receiver -> dev branch -> staging deploy -> E2E -> PR to main -> production" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Track progress: https://github.com/hanzoai/universe/actions" >> "$GITHUB_STEP_SUMMARY"
