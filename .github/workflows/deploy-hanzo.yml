name: Docker Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # ── Test gates — broken code does not ship ───────────────────
  lint-and-typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: true
      matrix:
        target: [backend, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: ${{ matrix.target }}/pnpm-lock.yaml
      - name: "Strip file: deps (backend only) and install"
        working-directory: ${{ matrix.target }}
        run: |
          if [ "${{ matrix.target }}" = "backend" ]; then
            node -e "const p=JSON.parse(require('fs').readFileSync('package.json','utf8'));for(const s of['dependencies','devDependencies','optionalDependencies'])if(p[s])for(const[k,v]of Object.entries(p[s]))if(typeof v==='string'&&v.startsWith('file:'))p[s][k]='*';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"
          fi
          pnpm install --no-frozen-lockfile
      - name: Type check (non-blocking)
        run: pnpm run type:check || true
        working-directory: ${{ matrix.target }}
      - name: Lint (non-blocking until backlog resolved)
        run: pnpm run lint || true
        working-directory: ${{ matrix.target }}

  unit-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'
          cache-dependency-path: backend/pnpm-lock.yaml
      - name: "Strip file: deps and install"
        working-directory: backend
        run: |
          node -e "const p=JSON.parse(require('fs').readFileSync('package.json','utf8'));for(const s of['dependencies','devDependencies','optionalDependencies'])if(p[s])for(const[k,v]of Object.entries(p[s]))if(typeof v==='string'&&v.startsWith('file:'))p[s][k]='*';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"
          pnpm install --no-frozen-lockfile
      - name: Start postgres and redis
        run: touch .env && docker compose -f docker-compose.dev.yml up -d db redis
      - name: Wait for services
        run: |
          for i in $(seq 1 30); do
            docker compose -f docker-compose.dev.yml exec -T db pg_isready -U hanzokms && break
            sleep 1
          done
      - name: Unit tests (non-blocking until native deps fixed)
        run: pnpm run test:unit || true
        working-directory: backend
        env:
          REDIS_URL: redis://172.17.0.1:6379
          DB_CONNECTION_URI: postgres://hanzokms:hanzokms@172.17.0.1:5432/hanzokms?sslmode=disable
          AUTH_SECRET: something-random

  # ── Build + deploy (only after gates pass) ──────────────────
  docker:
    needs: [lint-and-typecheck, unit-tests]
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/kms
      dockerfile: Dockerfile.standalone-kms
      platforms: linux/amd64
      deploy: true
      deploy-deployment: kms
      deploy-namespace: hanzo
    secrets: inherit

  # ── Notify universe for unified deploy tracking ────────────
  notify-universe:
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Trigger universe deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.UNIVERSE_DEPLOY_TOKEN }}
          repository: hanzoai/universe
          event-type: service-built
          client-payload: >-
            {
              "service": "kms",
              "image": "ghcr.io/hanzoai/kms:main",
              "sha": "${{ github.sha }}",
              "repo": "${{ github.repository }}"
            }
