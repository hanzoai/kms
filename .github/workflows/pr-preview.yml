name: PR Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed]

permissions:
  contents: read
  packages: write
  pull-requests: write

jobs:
  preview:
    uses: hanzoai/.github/.github/workflows/pr-preview.yml@main
    with:
      service: kms
      image: ghcr.io/hanzoai/kms
      dockerfile: Dockerfile.standalone-kms
      port: "8080"
      health-path: /api/status
      e2e-dir: frontend/e2e
    secrets: inherit
