name: "Check Backend PR types and lint"

on:
  pull_request:
    types: [opened, synchronize]
    paths:
      - "backend/**"
      - "!backend/README.md"
      - "!backend/.*"
      - "backend/.eslintrc.js"

jobs:
  check-be-pr:
    name: Check TS and Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: ☁️ Checkout source
        uses: actions/checkout@v3
      - name: 🔧 Setup Node 22
        uses: actions/setup-node@v3
        with:
          node-version: "22"
          cache: "pnpm"
          cache-dependency-path: backend/pnpm-lock.yaml
      - uses: pnpm/action-setup@v4
        with:
          version: latest
      - name: Strip file: deps and install
        working-directory: backend
        run: |
          node -e "const p=JSON.parse(require('fs').readFileSync('package.json','utf8'));for(const s of['dependencies','devDependencies','optionalDependencies'])if(p[s])for(const[k,v]of Object.entries(p[s]))if(typeof v==='string'&&v.startsWith('file:'))p[s][k]='*';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"
          pnpm install --no-frozen-lockfile
      - name: Run type check
        run: npm run type:check
        working-directory: backend
      - name: Run lint check
        run: npm run lint
        working-directory: backend
