name: Build kms

on:
  push:
    branches: [main]
    paths:
      - 'cmd/**'
      - 'internal/**'
      - 'go.mod'
      - 'go.sum'
      - 'Dockerfile'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      dockerfile: Dockerfile
      image: ghcr.io/hanzoai/kms
      platforms: linux/amd64,linux/arm64
    secrets: inherit
