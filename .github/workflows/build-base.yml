name: Build KMS Base Image

on:
  push:
    branches: [main]
    paths: ['Dockerfile.base']
  schedule:
    - cron: '0 0 * * 0'  # Weekly Sunday rebuild
  workflow_dispatch:

concurrency:
  group: kms-base-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-base:
    runs-on: hanzo-build
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3
        with:
          driver: docker-container
          driver-opts: network=host

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.base
          push: true
          tags: |
            ghcr.io/hanzoai/kms-base:latest
            ghcr.io/hanzoai/kms-base:${{ github.sha }}
          platforms: linux/amd64
          cache-from: type=registry,ref=ghcr.io/hanzoai/kms-base-cache:amd64
          cache-to: type=registry,ref=ghcr.io/hanzoai/kms-base-cache:amd64,mode=max
          provenance: false
