name: Build KMS Base Image

on:
  push:
    branches: [main]
    paths: ['Dockerfile.base']
  schedule:
    - cron: '0 0 * * 0'  # Weekly Sunday rebuild
  workflow_dispatch:

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/kms-base
      dockerfile: Dockerfile.base
    secrets: inherit
