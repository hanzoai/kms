name: Docker (standalone)
on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-nightly-*"
      - "v*.*.*-nightly-*.*"
permissions:
  contents: read
  packages: write
  id-token: write
jobs:
  docker:
    strategy:
      matrix:
        include:
          - image: ghcr.io/hanzoai/kms
            dockerfile: Dockerfile.standalone-kms
          # kms-fips removed — Dockerfile.fips.standalone-kms has been broken
          # for months and the FIPS variant has never shipped. Re-add only
          # when there's a real consumer.
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ${{ matrix.image }}
      dockerfile: ${{ matrix.dockerfile }}
      platforms: linux/amd64
      runner-amd64: ubuntu-latest
    secrets: inherit
