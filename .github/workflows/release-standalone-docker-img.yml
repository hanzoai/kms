name: Docker (standalone)
on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-nightly-*"
      - "v*.*.*-nightly-*.*"
permissions:
  contents: read
  packages: write
  id-token: write
jobs:
  docker:
    strategy:
      matrix:
        include:
          - image: ghcr.io/hanzoai/kms
            dockerfile: Dockerfile.standalone-kms
          - image: ghcr.io/hanzoai/kms-fips
            dockerfile: Dockerfile.fips.standalone-kms
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ${{ matrix.image }}
      dockerfile: ${{ matrix.dockerfile }}
      pre-build-command: |
        corepack enable
        cd backend && node -e "const p=JSON.parse(require('fs').readFileSync('package.json','utf8'));for(const s of['dependencies','devDependencies','optionalDependencies'])if(p[s])for(const[k,v]of Object.entries(p[s]))if(typeof v==='string'&&v.startsWith('file:'))p[s][k]='*';require('fs').writeFileSync('package.json',JSON.stringify(p,null,2))"
        cd backend && pnpm install --prod --no-frozen-lockfile
    secrets: inherit
