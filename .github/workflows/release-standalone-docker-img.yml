name: Docker (standalone)
on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-nightly-*"
      - "v*.*.*-nightly-*.*"
permissions:
  contents: read
  packages: write
  id-token: write
jobs:
  docker:
    strategy:
      matrix:
        include:
          - image: ghcr.io/hanzoai/kms
            dockerfile: Dockerfile
          # Top-level canonical image stays ghcr.io/hanzoai/kms. hanzokms
          # org holds subprojects (kms-fips, mpc-node, etc.). Cross-org
          # publish requires hanzoai admin to add this repo (hanzokms/kms)
          # as a permitted publisher on the ghcr.io/hanzoai/kms package
          # (Settings → Packages → Manage Actions access).
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ${{ matrix.image }}
      dockerfile: ${{ matrix.dockerfile }}
      platforms: linux/amd64
      runner-amd64: ubuntu-latest
    secrets: inherit
