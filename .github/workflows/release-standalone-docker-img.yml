name: Docker (standalone)
on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-nightly-*"
      - "v*.*.*-nightly-*.*"
permissions:
  contents: read
  packages: write
  id-token: write
jobs:
  docker:
    permissions:
      contents: read
      packages: write
      id-token: write
    strategy:
      matrix:
        include:
          - image: ghcr.io/hanzoai/kms
            dockerfile: Dockerfile
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ${{ matrix.image }}
      dockerfile: ${{ matrix.dockerfile }}
      platforms: linux/amd64
      runner-amd64: ubuntu-latest
    secrets: inherit
